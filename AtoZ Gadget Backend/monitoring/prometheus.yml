global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    project: atoz

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # AtoZ Backend metrics
  - job_name: atoz_backend
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  # API Gateway metrics
  - job_name: atoz_gateway
    static_configs:
      - targets: ["gateway:8080"]
    metrics_path: /metrics
    scrape_interval: 10s

  # MySQL exporter (requires mysql-exporter container)
  - job_name: mysql
    static_configs:
      - targets: ["mysql-exporter:9104"]

  # Redis exporter (requires redis-exporter container)
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Node exporter (system metrics — requires node-exporter container)
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
