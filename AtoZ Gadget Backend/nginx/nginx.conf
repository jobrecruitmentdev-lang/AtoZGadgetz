worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    gzip              on;
    gzip_vary         on;
    gzip_types        text/plain application/json application/javascript text/css;

    # Security headers
    add_header X-Frame-Options         DENY always;
    add_header X-Content-Type-Options  nosniff always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # Upstream: API Gateway
    upstream api_gateway {
        server gateway:8080;
        keepalive 32;
    }

    # Upstream: Direct backend (for /uploads static files)
    upstream api_backend {
        server app:8000;
        keepalive 32;
    }

    # ─────────────────────────────────────────────
    # HTTP → HTTPS redirect
    # ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────
    # HTTPS Main Server
    # ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.atozgadgets.com;

        # SSL Configuration
        ssl_certificate     /etc/nginx/ssl/atoz.crt;
        ssl_certificate_key /etc/nginx/ssl/atoz.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling        on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 50M;

        # Auth endpoints — stricter rate limiting
        location /api/auth {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # API endpoints
        location /api {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        # Static uploads (served directly from backend)
        location /uploads {
            proxy_pass http://api_backend;
            proxy_cache_valid 200 1d;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # Metrics — internal only
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://api_backend;
        }

        # API Docs
        location /docs {
            proxy_pass http://api_backend;
        }

        location /openapi.json {
            proxy_pass http://api_backend;
        }

        # Health check (no rate limit)
        location /api/health {
            proxy_pass http://api_backend;
        }
    }

    # ─────────────────────────────────────────────
    # Development: plain HTTP (for local testing)
    # ─────────────────────────────────────────────
    server {
        listen 8090;
        server_name localhost;

        client_max_body_size 50M;

        location / {
            proxy_pass http://api_gateway;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
