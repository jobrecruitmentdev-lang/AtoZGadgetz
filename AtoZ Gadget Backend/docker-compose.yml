version: "3.9"

# =============================================================
# AtoZ Gadgets — Production Docker Compose (Phase 7 Enterprise)
# =============================================================
# Services:
#   app           — FastAPI backend (port 8000)
#   gateway       — API Gateway (port 8080)
#   db            — MySQL 8.0 (port 3306)
#   redis         — Redis 7 cache (port 6379)
#   elasticsearch — ES 8 search engine (port 9200)
#   prometheus    — Metrics scraping (port 9090)
#   grafana       — Dashboards (port 3000)
#   nginx         — Reverse proxy / SSL (port 80 / 443)
# =============================================================

services:

  # ─────────────────────────────
  # MySQL Database
  # ─────────────────────────────
  db:
    image: mysql:8.0
    container_name: atoz_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-atoz_root_2026}
      MYSQL_DATABASE: atoz_gadgets_db
      MYSQL_USER: atoz_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-atoz_pass_2026}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
      --innodb_buffer_pool_size=512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atoz_network

  # ─────────────────────────────
  # Redis Cache
  # ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: atoz_redis
    restart: always
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - atoz_network

  # ─────────────────────────────
  # Elasticsearch
  # ─────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: atoz_elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=atoz-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - atoz_network

  # ─────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atoz_backend
    restart: always
    environment:
      DATABASE_URL: mysql+pymysql://atoz_user:${DB_PASSWORD:-atoz_pass_2026}@db:3306/atoz_gadgets_db
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SECRET_KEY: ${SECRET_KEY:-atoz_secret_key_2026}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      APP_ENV: production
      ENABLE_METRICS: "true"
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
    ports:
      - "8000:8000"
    volumes:
      - ./app/uploads:/app/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - atoz_network

  # ─────────────────────────────
  # API Gateway
  # ─────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: atoz_gateway
    restart: always
    environment:
      BACKEND_URL: http://app:8000
      SECRET_KEY: ${SECRET_KEY:-atoz_secret_key_2026}
      GATEWAY_RATE_LIMIT: 200
      GATEWAY_TIMEOUT: 30
    ports:
      - "8080:8080"
    depends_on:
      - app
    networks:
      - atoz_network

  # ─────────────────────────────
  # Prometheus Monitoring
  # ─────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: atoz_prometheus
    restart: always
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - atoz_network

  # ─────────────────────────────
  # Grafana Dashboards
  # ─────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: atoz_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    networks:
      - atoz_network

  # ─────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: atoz_nginx
    restart: always
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./app/uploads:/var/www/uploads:ro
    depends_on:
      - app
      - gateway
    networks:
      - atoz_network


# ─────────────────────────────
# Volumes
# ─────────────────────────────
volumes:
  mysql_data:
  redis_data:
  es_data:
  prometheus_data:
  grafana_data:


# ─────────────────────────────
# Networks
# ─────────────────────────────
networks:
  atoz_network:
    driver: bridge
