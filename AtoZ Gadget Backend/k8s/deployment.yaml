---
# =============================================
# AtoZ Backend — Kubernetes Deployment
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atoz-backend
  namespace: atoz
  labels:
    app: atoz-backend
    version: "7.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: atoz-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: atoz-backend
        version: "7.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: atoz-backend
          image: atoz/backend:7.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: atoz-config
            - secretRef:
                name: atoz-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /app/app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: atoz-uploads-pvc
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - atoz-backend
                topologyKey: kubernetes.io/hostname

---
# =============================================
# AtoZ Gateway — Kubernetes Deployment
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atoz-gateway
  namespace: atoz
  labels:
    app: atoz-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atoz-gateway
  template:
    metadata:
      labels:
        app: atoz-gateway
    spec:
      containers:
        - name: atoz-gateway
          image: atoz/gateway:7.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND_URL
              value: "http://atoz-backend-service:8000"
          envFrom:
            - configMapRef:
                name: atoz-config
            - secretRef:
                name: atoz-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /gateway/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /gateway/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30

---
# =============================================
# Uploads PersistentVolumeClaim
# =============================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atoz-uploads-pvc
  namespace: atoz
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
