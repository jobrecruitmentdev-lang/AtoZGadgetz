---
# Horizontal Pod Autoscaler — Backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: atoz-backend-hpa
  namespace: atoz
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: atoz-backend
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
# Horizontal Pod Autoscaler — Gateway
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: atoz-gateway-hpa
  namespace: atoz
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: atoz-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
