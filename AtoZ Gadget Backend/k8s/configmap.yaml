---
apiVersion: v1
kind: ConfigMap
metadata:
  name: atoz-config
  namespace: atoz
data:
  APP_NAME: "AtoZ Gadgets API"
  APP_ENV: "production"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"
  REDIS_URL: "redis://atoz-redis-service:6379"
  ELASTICSEARCH_URL: "http://atoz-elasticsearch-service:9200"
  ELASTICSEARCH_INDEX_PRODUCTS: "atoz_products"
  ELASTICSEARCH_INDEX_CATEGORIES: "atoz_categories"
  ELASTICSEARCH_INDEX_BRANDS: "atoz_brands"
  RAZORPAY_CURRENCY: "INR"
  ENABLE_METRICS: "true"
  MEDIA_STORAGE: "s3"
  RATE_LIMIT_PER_MINUTE: "100"
  BRUTE_FORCE_MAX_ATTEMPTS: "5"
  BRUTE_FORCE_LOCKOUT_MINUTES: "15"
  GATEWAY_RATE_LIMIT: "200"
  GATEWAY_TIMEOUT: "30"
