---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: atoz-backend-service
  namespace: atoz
  labels:
    app: atoz-backend
spec:
  selector:
    app: atoz-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP

---
# Gateway Service (LoadBalancer for external access)
apiVersion: v1
kind: Service
metadata:
  name: atoz-gateway-service
  namespace: atoz
  labels:
    app: atoz-gateway
spec:
  selector:
    app: atoz-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: https
      port: 443
      targetPort: 8080
  type: LoadBalancer
