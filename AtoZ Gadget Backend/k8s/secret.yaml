---
# IMPORTANT: Replace all values with base64-encoded strings
# Command to encode: echo -n "your_value" | base64
# Command to create: kubectl apply -f secret.yaml
# 
# Example:
#   echo -n "atoz_secret_key_2026" | base64
#   => YXRvel9zZWNyZXRfa2V5XzIwMjY=

apiVersion: v1
kind: Secret
metadata:
  name: atoz-secrets
  namespace: atoz
type: Opaque
stringData:
  # Database
  DATABASE_URL: "mysql+pymysql://atoz_user:CHANGE_ME@atoz-mysql-service:3306/atoz_gadgets_db"

  # Auth
  SECRET_KEY: "atoz_secret_key_CHANGE_ME_IN_PRODUCTION"

  # Razorpay
  RAZORPAY_KEY_ID: "rzp_live_CHANGE_ME"
  RAZORPAY_KEY_SECRET: "CHANGE_ME"
  RAZORPAY_WEBHOOK_SECRET: "CHANGE_ME"

  # Stripe (optional)
  STRIPE_SECRET_KEY: "sk_live_CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "whsec_CHANGE_ME"

  # AWS S3
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  AWS_S3_BUCKET: "atoz-media"
  AWS_S3_REGION: "ap-south-1"

  # SMTP
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "noreply@atozgadgets.com"
  SMTP_PASSWORD: "CHANGE_ME"
